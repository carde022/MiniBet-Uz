<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash | MiniBet Uz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #plane-area { 
            height: 250px; 
            background: #141f2b; 
            border-radius: 15px; 
            position: relative; 
            overflow: hidden; 
            margin-top: 15px;
            border: 2px solid #243447;
        }
        #plane { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            font-size: 35px; 
            color: #e74c3c; 
            z-index: 10;
        }
        #multiplier { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 50px; 
            font-weight: 900; 
            color: white; 
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .grid-line {
            position: absolute;
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <button onclick="location.href='main.html'" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 style="margin-left: 15px; color: #3498db; margin: 0;">🚀 CRASH (AVIATOR)</h2>
        </div>

        <div id="plane-area">
            <div id="multiplier">1.00x</div>
            <i class="fas fa-plane" id="plane"></i>
            <div style="position:absolute; bottom:0; left:0; width:100%; height:1px; background:rgba(255,255,255,0.2);"></div>
            <div style="position:absolute; bottom:0; left:0; width:1px; height:100%; background:rgba(255,255,255,0.2);"></div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div id="status" style="text-align:center; margin-bottom:10px; font-weight:bold; min-height:20px;">Tikishni kiriting</div>
            
            <input type="number" id="bet" value="1000" placeholder="Stavka miqdori">
            
            <button id="bet-btn" class="btn btn-success" onclick="startCrash()">TIKISH (START)</button>
            <button id="cashout-btn" class="btn btn-primary" style="display:none;" onclick="cashoutCrash()">PULNI YECHISH (CASHOUT)</button>
        </div>
        
        <p style="text-align:center; font-size:12px; color:#888; margin-top:15px;">
            Samolyot uchib ketishidan oldin pulni yechib oling!
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/aviator.js"></script>
</body>
</html>
