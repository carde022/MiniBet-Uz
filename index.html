<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBet Uz - Ro'yxatdan o'tish</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #1a2a3a, #101b27);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.reg-card {
    background: #243447;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 100%;
    max-width: 400px;
    position: relative;
    overflow: hidden;
}
.header {
    text-align: center;
    margin-bottom: 20px;
    color: #28a745;
    font-size: 26px;
    font-weight: bold;
}
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #1a2a3a;
    border: 1px solid #34495e;
    color: white;
    border-radius: 6px;
    box-sizing: border-box;
    transition: 0.3s;
}
input:focus { border-color: #28a745; outline: none; }
button {
    width: 100%;
    padding: 15px;
    background: #28a745;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}
button:hover { background: #218838; }
.bonus-info {
    font-size: 13px;
    color: #bdc3c7;
    margin-top: 10px;
    text-align: center;
}
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    display: none;
    z-index: 1000;
}
.loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
    display: none;
    z-index: 10;
}
.loading-overlay.active { display: flex; }
.spinner {
    border: 4px solid #444;
    border-top: 4px solid #28a745;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="reg-card">
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
    </div>
    <div class="header">MiniBet Uz</div>
    <p style="text-align:center; font-size:14px;">Ro'yxatdan o'tish</p>
    
    <input type="text" id="firstName" placeholder="Ism *">
    <input type="text" id="lastName" placeholder="Familiya *">
    <input type="email" id="email" placeholder="Email *">
    <input type="text" id="phone" placeholder="Telefon (+998...)">
    <input type="password" id="password" placeholder="Parol *">
    <input type="number" id="tgId" placeholder="Telegram ID raqamingiz">
    
    <button onclick="register()">RO'YXATDAN O'TISH</button>
    
    <div class="bonus-info">
        Bonus: 10,000 UZS + 1XGAMES
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const NGROK_URL = "https://justa-recriminative-nonrequisitely.ngrok-free.dev";

function showToast(msg, success=true){
    const toast = document.getElementById('toast');
    toast.style.background = success ? '#28a745' : '#e74c3c';
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(()=>{ toast.style.display = 'none'; }, 3500);
}

function validate(data){
    if(!data.first_name || !data.last_name || !data.email || !data.password)
        return "Iltimos, * bilan belgilangan maydonlarni to'ldiring!";
    if(!/^\+998\d{9}$/.test(data.phone)) return "Telefon raqamingiz +998XXXXXXXXX formatida bo'lishi kerak!";
    if(data.password.length < 6) return "Parol kamida 6 ta belgidan iborat bo'lishi kerak!";
    return null;
}

async function register() {
    const loading = document.getElementById('loading');
    const data = {
        first_name: document.getElementById('firstName').value.trim(),
        last_name: document.getElementById('lastName').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value,
        tg_id: parseInt(document.getElementById('tgId').value) || null
    };

    const validationError = validate(data);
    if(validationError){ showToast(validationError, false); return; }

    try {
        loading.classList.add('active');

        const response = await fetch(`${NGROK_URL}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        if(response.ok){
            showToast("✅ " + result.message);
            setTimeout(()=>{ window.location.href = "game.html"; }, 1500);
        } else {
            showToast("❌ " + (result.detail || "Ma'lumotlarni tekshiring"), false);
        }

    } catch (error) {
        showToast("Backend server o'chiq yoki ulanib bo'lmadi!", false);
    } finally {
        loading.classList.remove('active');
    }
}
</script>

</body>
</html>
