<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniBet Uz | Pro v2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #090e14; --panel: #151a21; --accent: #007aff; --win: #22c55e; --red: #ff3b30; --gold: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* Start Screen */
        #entry-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #232a35; }
        #main-container { flex: 1; overflow-y: auto; padding: 15px; }

        /* UI Elements */
        input { width: 100%; padding: 16px; background: #1e252f; border: 1px solid #334155; color: white; border-radius: 12px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn-play { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; }

        /* Aviator */
        #crash-area { background: #000; height: 200px; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid #232a35; background: radial-gradient(circle at bottom left, #0f172a, #000); }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 35px; z-index: 10; transition: transform 0.1s linear; }
        #crash-mult { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: 900; color: var(--win); z-index: 5; }

        /* Live Bets */
        .live-bets { margin-top: 15px; background: var(--panel); border-radius: 12px; padding: 10px; font-size: 11px; }
        .bet-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #232a35; }

        /* Mines */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .cell { aspect-ratio: 1; background: #2c3440; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .win-cell { background: var(--win) !important; box-shadow: 0 0 15px var(--win); }
        .lose-cell { background: var(--red) !important; }

        footer { background: var(--panel); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #232a35; }
        .nav-item { color: #8e8e93; font-size: 11px; text-align: center; cursor: pointer; }
        .active-nav { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="entry-screen">
    <div style="font-size: 60px; margin-bottom: 10px;">🎰</div>
    <h1 style="color: var(--gold); margin: 0;">MINIBET UZ</h1>
    <p style="color: #8e8e93;">Professional Gaming Platform</p><br>
    <button class="btn-play" style="background: var(--accent); color: white; width: 220px;" onclick="initApp()">O'YINNI BOSHLASH</button>
</div>

<audio id="s-click" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>
<audio id="s-fly" src="https://www.soundjay.com/mechanical/sounds/jet-engine-take-off-1.mp3" loop></audio>
<audio id="s-boom" src="https://www.soundjay.com/free-music/sounds/explosion-01.mp3"></audio>
<audio id="s-win" src="https://www.myinstants.com/media/sounds/level-up-video-game.mp3"></audio>

<header>
    <div style="font-weight: 900; color: var(--gold);">MINIBET UZ</div>
    <div id="balance-display" style="font-weight: bold; color: var(--gold);">0 UZS</div>
</header>

<main id="main-container">
    <div id="lobby-view">
        <h3 style="margin-top: 0;">🔥 Eng Sara O'yinlar</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="background:var(--panel); padding:25px; border-radius:15px; text-align:center; border: 1px solid #232a35;" onclick="openGame('mines')"><div>💣</div><b>Mines</b></div>
            <div style="background:var(--panel); padding:25px; border-radius:15px; text-align:center; border: 1px solid #232a35;" onclick="openGame('crash')"><div>🚀</div><b>Aviator</b></div>
        </div>
    </div>

    <div id="crash-view" class="hidden">
        <div id="crash-area"><div id="crash-mult">1.00x</div><div id="rocket">🚀</div></div>
        <div style="display:flex; gap:10px; margin: 15px 0;">
            <input type="number" id="crash-bet" value="5000">
            <button id="crash-btn" onclick="startCrash()" class="btn-play" style="background:var(--win); color:white; flex:1;">TIKISH</button>
        </div>
        <div class="live-bets" id="live-list"></div>
    </div>

    <div id="mines-view" class="hidden">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold; color:var(--win);">
            <span>Koeff: <span id="m-mult">x1.00</span></span><span>Yutuq: <span id="m-win">0</span></span>
        </div>
        <div id="mines-grid" class="grid"></div>
        <div style="margin-top:20px;">
            <input type="number" id="mines-bet" value="5000" placeholder="Stavka summasi">
            <button id="mines-btn" onclick="startMines()" class="btn-play" style="background:var(--accent); color:white;">BOSHLASH</button>
        </div>
    </div>
</main>

<footer>
    <div class="nav-item active-nav" onclick="showTab('lobby')">🏠<br>Lobbi</div>
    <div class="nav-item" onclick="alert('Bonus: 24 soatda 1 marta!')">🎁<br>Bonus</div>
    <div class="nav-item" onclick="alert('ID: ' + (window.Telegram.WebApp.initDataUnsafe.user?.id || '7425396576'))">👤<br>Profil</div>
</footer>

<script>
    let tg = window.Telegram.WebApp;
    let balance = 25000; 
    let isPlaying = false;
    let crashInt, audioOn = false;

    function initApp() { audioOn = true; document.getElementById('entry-screen').classList.add('hidden'); playS('s-click'); updateUI(); }
    function playS(id) { if(audioOn) { let s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); } }
    function stopS(id) { if(audioOn) document.getElementById(id).pause(); }
    function updateUI() { document.getElementById('balance-display').innerText = balance.toLocaleString() + " UZS"; }

    function showTab(tab) {
        ['lobby', 'mines', 'crash'].forEach(v => document.getElementById(v + '-view').classList.add('hidden'));
        document.getElementById(tab + '-view').classList.remove('hidden');
        playS('s-click');
    }

    function openGame(g) { showTab(g); if(g==='mines') initMines(); if(g==='crash') renderBets(false); }

    // --- Aviator Professional ---
    function renderBets(active, m = 1.0) {
        const l = document.getElementById('live-list');
        l.innerHTML = '<div style="color:#8e8e93; font-size:10px; display:flex; justify-content:space-between; margin-bottom:10px;"><span>ID</span><span>STAVKA</span><span>STATUS</span></div>';
        for(let i=0; i<6; i++) {
            let id = 100000 + (i * 12345 % 800000);
            let b = (i+1) * 5000;
            let st = active ? "Uchyapti..." : (Math.random() > 0.4 ? "Yutdi" : "Kuydi");
            let cl = st === "Yutdi" ? "status-win" : (st === "Kuydi" ? "status-lose" : "");
            if(active && m > (1.1 + i*0.4)) { st = (1.1 + i*0.4).toFixed(2) + "x yechdi"; cl = "status-win"; }
            l.innerHTML += `<div class="bet-row"><span>ID:${id}</span><span>${b}</span><span class="${cl}">${st}</span></div>`;
        }
    }

    function startCrash() {
        let bet = parseFloat(document.getElementById('crash-bet').value);
        if(bet > balance || isPlaying) return;
        balance -= bet; updateUI(); isPlaying = true;
        playS('s-fly');
        let m = 1.0;
        let limit = (Math.random() < 0.15 ? 1.00 : (1.05 + Math.random() * 4).toFixed(2));
        let btn = document.getElementById('crash-btn');
        btn.style.background = var(--gold); btn.style.color = "black";
        btn.onclick = () => { if(isPlaying) { isPlaying = false; finishCrash(bet, m, true); } };

        crashInt = setInterval(() => {
            if(m >= limit) { isPlaying = false; finishCrash(bet, m, false); return; }
            m += 0.01;
            document.getElementById('crash-mult').innerText = m.toFixed(2) + "x";
            document.getElementById('rocket').style.transform = `translate(${(m-1)*60}px, -${(m-1)*45}px)`;
            btn.innerText = "OLISH " + Math.floor(bet * m);
            renderBets(true, m);
        }, 80);
    }

    function finishCrash(bet, m, win) {
        clearInterval(crashInt); stopS('s-fly');
        if(win) { playS('s-win'); balance += Math.floor(bet * m); updateUI(); alert("YUTUQ: " + Math.floor(bet * m)); }
        else { playS('s-boom'); document.getElementById('crash-mult').style.color = "red"; document.getElementById('crash-mult').innerText = "BOOM!"; }
        setTimeout(resetCrash, 2000);
    }

    function resetCrash() {
        let btn = document.getElementById('crash-btn');
        btn.style.background = "var(--win)"; btn.style.color = "white"; btn.innerText = "TIKISH";
        btn.onclick = startCrash;
        document.getElementById('crash-mult').style.color = "var(--win)";
        document.getElementById('crash-mult').innerText = "1.00x";
        document.getElementById('rocket').style.transform = "none";
        renderBets(false);
    }

    // --- Mines Professional ---
    let mb = [], mo = 0, mbt = 0, mp = false;
    let ms = [1.2, 1.6, 2.1, 2.9, 4.2, 6.3, 10, 18, 35, 70];

    function initMines() {
        const g = document.getElementById('mines-grid'); g.innerHTML = '';
        for(let i=0; i<25; i++) {
            let c = document.createElement('div'); c.className = 'cell';
            c.onclick = () => openM(c, i); g.appendChild(c);
        }
    }

    function startMines() {
        mbt = parseFloat(document.getElementById('mines-bet').value);
        if(mbt > balance || mp) return;
        balance -= mbt; updateUI(); mp = true; mo = 0; mb = [];
        playS('s-click');
        while(mb.length < 3) { let r = Math.floor(Math.random()*25); if(!mb.includes(r)) mb.push(r); }
        initMines();
        let btn = document.getElementById('mines-btn');
        btn.innerText = "PULNI OLISH"; btn.style.background = var(--gold); btn.style.color = "black";
        btn.onclick = () => { if(mp && mo>0) { balance += Math.floor(mbt * ms[mo-1]); updateUI(); playS('s-win'); stopM(); } };
    }

    function openM(el, id) {
        if(!mp || el.innerText !== '') return;
        if(mb.includes(id)) {
            el.innerHTML = "💣"; el.classList.add('lose-cell'); mp = false;
            playS('s-boom'); alert("BOMBA!"); stopM();
        } else {
            el.innerHTML = "💎"; el.classList.add('win-cell'); mo++;
            playS('s-win');
            document.getElementById('m-mult').innerText = "x" + ms[mo-1];
            document.getElementById('m-win').innerText = Math.floor(mbt * ms[mo-1]);
        }
    }
    function stopM() { mp = false; let b = document.getElementById('mines-btn'); b.innerText = "BOSHLASH"; b.style.background = "var(--accent)"; b.style.color = "white"; b.onclick = startMines; }
</script>
</body>
</html>
