<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiniBet Uz | Professional Casino Lobby</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #090e14;
            --bg-panel: #141b25;
            --accent: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #00c6ff 100%);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* --- Global Elements --- */
        .hidden { display: none !important; }

        /* --- Header --- */
        header {
            background: var(--bg-panel);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #232a35;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .brand-logo { font-size: 20px; font-weight: 800; color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; }
        .balance-container { text-align: right; }
        .balance-label { font-size: 11px; color: var(--text-secondary); }
        .balance-value { font-size: 18px; font-weight: 700; color: #ffcc00; }

        /* --- Main Content Area (SPA Container) --- */
        #main-container { flex: 1; overflow-y: auto; padding: 20px; }

        /* --- Lobby View (Categories) --- */
        .category-section { margin-bottom: 25px; }
        .category-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: var(--text-primary); display: flex; align-items: center; gap: 8px;}
        .category-title i { color: var(--accent); }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: var(--bg-panel);
            border-radius: 16px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        .game-card:active { transform: scale(0.96); }

        .game-thumb { width: 100%; aspect-ratio: 16/10; background-color: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 40px;}

        .game-info { padding: 12px; }
        .game-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .game-provider { font-size: 12px; color: var(--text-secondary); }

        .game-card.new::before {
            content: "NEW"; position: absolute; top: 8px; right: 8px;
            background: #22c55e; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700;
        }

        /* --- Game View (Mines) --- */
        #game-view {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            animation: fadeIn 0.4s ease-out; height: 100%;
        }

        .game-header-bar {
            width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .btn-back {
            background: var(--bg-panel); color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px;
        }

        .mines-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; width: 90%; max-width: 380px; margin: 20px 0;
        }

        .mines-cell {
            aspect-ratio: 1; background: #2c3440; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; transition: transform 0.1s, background 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .mines-cell:active { transform: scale(0.9); }
        .mines-cell.open-win { background: #22c55e; box-shadow: 0 0 15px #22c55e; }
        .mines-cell.open-lose { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .mines-cell.disabled { pointer-events: none; opacity: 0.8; }

        .mines-controls {
            width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; margin-top: auto; padding-bottom: 20px;
        }

        .bet-input-wrapper { position: relative; width: 100%; }
        .bet-input-wrapper span { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px;}

        input[type="number"] {
            width: 100%; background: var(--bg-panel); border: 1px solid #3a4452; color: white;
            padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 600; outline: none;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-play-action {
            background: var(--accent-gradient); color: white; border: none;
            padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 14px rgba(0, 122, 255, 0.4);
            transition: var(--transition);
        }

        .btn-play-action:active { transform: translateY(2px); box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3); }
        .btn-play-action:disabled { background: #3a4452; color: #8e8e93; cursor: not-allowed; box-shadow: none; }

        /* --- Footer (Nav) --- */
        footer {
            background: var(--bg-panel);
            padding: 12px 0; border-top: 1px solid #232a35;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary); cursor: pointer; transition: var(--transition); font-size: 12px; }
        .nav-item.active { color: var(--accent); font-weight: 600;}
        .nav-item i { font-size: 22px; }

        /* --- Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="brand-logo">MiniBet Uz</div>
    <div class="balance-container">
        <div class="balance-label">HISOBINGIZ</div>
        <div class="balance-value" id="balance-display">0 UZS</div>
    </div>
</header>

<main id="main-container">
    <div id="lobby-view">
        <div class="category-section">
            <div class="category-title"><i class="fas fa-rocket"></i> Crash O'yinlar</div>
            <div class="game-grid">
                <div class="game-card new" onclick="loadGame('mines')">
                    <div class="game-thumb">💣</div>
                    <div class="game-info">
                        <div class="game-name">Mines</div>
                        <div class="game-provider">MiniBet Originals</div>
                    </div>
                </div>
                <div class="game-card">
                    <div class="game-thumb">🚀</div>
                    <div class="game-info">
                        <div class="game-name">Crash</div>
                        <div class="game-provider">Yaqinda...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-section">
            <div class="category-title"><i class="fas fa-th"></i> Eng Sara Slotlar</div>
            <div class="game-grid">
                <div class="game-card">
                    <div class="game-thumb">🎰</div>
                    <div class="game-info">
                        <div class="game-name">Book of Ra</div>
                        <div class="game-provider">Greentube</div>
                    </div>
                </div>
                <div class="game-card">
                    <div class="game-thumb">🍒</div>
                    <div class="game-info">
                        <div class="game-name">Sizzling Hot</div>
                        <div class="game-provider">Greentube</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-view" class="hidden">
        <div class="game-header-bar">
            <button class="btn-back" onclick="closeGame()"><i class="fas fa-arrow-left"></i> Lobbiga</button>
            <div style="font-size: 18px; font-weight: 700; color: white;">MINES <span style="font-size: 14px; color:var(--text-secondary)">(MiniBet Originals)</span></div>
        </div>

        <div class="mines-grid" id="mines-grid">
            </div>

        <div class="mines-controls">
            <div class="bet-input-wrapper">
                <input type="number" id="mines-bet-input" placeholder="Summa" value="5000">
                <span>UZS</span>
            </div>
            <button class="btn-play-action" id="mines-start-btn" onclick="startMinesGame()">O'YINNI BOSHLASH</button>
        </div>
    </div>
</main>

<footer>
    <div class="nav-item active"><i class="fas fa-home"></i> Lobbi</div>
    <div class="nav-item"><i class="fas fa-history"></i> Tarix</div>
    <div class="nav-item"><i class="fas fa-user"></i> Profil</div>
</footer>

<script>
    // --- Telegram WebApp Setup ---
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // --- Configuration & State ---
    const API_URL = "https://sizning-api-serveringiz.com"; // Professional serveringiz manzili
    let isGamePlaying = false;
    let userBalance = 15000; // Bu botdan dinamik ravishda olinadi (test rejimi)

    // Update initial balance display
    document.getElementById('balance-display').innerText = userBalance.toLocaleString() + " UZS";

    // --- Single Page Application (SPA) Router ---
    function loadGame(gameId) {
        if (gameId === 'mines') {
            document.getElementById('lobby-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            document.querySelector('.nav-item.active').classList.remove('active'); // Deactivate Lobby nav
            createMinesGrid();
        }
    }

    function closeGame() {
        if (isGamePlaying) {
            if (!confirm("O'yin davom etmoqda. Chiqish yutqazishga teng. Chiqasizmi?")) return;
            tg.sendData(JSON.stringify({result: "lose", amount: parseFloat(document.getElementById('mines-bet-input').value)}));
            userBalance -= parseFloat(document.getElementById('mines-bet-input').value);
            document.getElementById('balance-display').innerText = userBalance.toLocaleString() + " UZS";
            isGamePlaying = false;
        }
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('lobby-view').classList.remove('hidden');
        document.querySelector('.nav-item').classList.add('active'); // Activate Lobby nav
    }

    // --- Mines Game Logic (SPA) ---
    function createMinesGrid() {
        const grid = document.getElementById('mines-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'mines-cell';
            cell.onclick = () => handleMinesCellClick(cell, i);
            grid.appendChild(cell);
        }
    }

    async function startMinesGame() {
        const bet = parseFloat(document.getElementById('mines-bet-input').value);
        if (bet > userBalance) return alert("Mablag' yetarli emas!");
        if (bet <= 0) return alert("Haqiqiy summa kiriting!");
        
        isGamePlaying = true;
        document.getElementById('mines-start-btn').disabled = true;
        document.getElementById('mines-bet-input').disabled = true;
        createMinesGrid(); // Clear the grid for new game
    }

    async function handleMinesCellClick(cell, cellId) {
        if (!isGamePlaying || cell.classList.contains('disabled')) return;

        const bet = parseFloat(document.getElementById('mines-bet-input').value);
        
        // SERVERGA SO'ROV YUBORISH (PROFESSIONAL API INTEGRATION)
        try {
            // Test rejimida API so'rovini simulyatsiya qilamiz
            // Real ish rejimi uchun buni haqiqiy fetch() ga almashtirasiz
            const data = await simulateApiResponse(bet);

            if (data.win) {
                cell.innerHTML = "💎";
                cell.classList.add('open-win', 'disabled');
            } else {
                cell.innerHTML = "💣";
                cell.classList.add('open-lose', 'disabled');
                endMinesGame(false, bet);
            }
        } catch (e) {
            alert("Serverga ulanishda xato!");
            console.error(e);
            endMinesGame(false, 0); // Reset game state on error
        }
    }

    function endMinesGame(isWin, bet) {
        isGamePlaying = false;
        document.getElementById('mines-start-btn').disabled = false;
        document.getElementById('mines-bet-input').disabled = false;
        
        if (!isWin) {
            userBalance -= bet;
            // Botga yutqazganlik haqida xabar berish
            tg.sendData(JSON.stringify({result: "lose", amount: bet}));
        }
        document.getElementById('balance-display').innerText = userBalance.toLocaleString() + " UZS";
    }

    // --- Helper: Simulate Server API for Testing ---
    // Professional serveringiz (server.py) ulangandan keyin bu olib tashlanadi
    function simulateApiResponse(bet) {
        return new Promise((resolve) => {
            setTimeout(() => {
                // Aldash mantiqi (agar ko'p tikilsa, ko'proq yutqazadi)
                let winChance = bet >= 15000 ? 0.20 : 0.40;
                resolve({
                    win: Math.random() < winChance,
                    bombs: [5, 12, 18] // Misol: real server har safar boshqa bombalarni qaytaradi
                });
            }, 300); // 300ms server javob berish vaqti
        });
    }

</script>

</body>
</html>
