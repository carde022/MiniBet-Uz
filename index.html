<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBet Uz | Virtual Casino</title>
<style>
:root { --bg:#090e14; --panel:#151a21; --accent:#007aff; --win:#22c55e; --red:#ff3b30; --gold:#ffcc00; }
body{margin:0;padding:0;font-family:-apple-system,sans-serif;background:var(--bg);color:white;display:flex;flex-direction:column;min-height:100vh;}
.hidden{display:none!important;}
header{background:var(--panel);padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #232a35;}
#main-container{flex:1;overflow-y:auto;padding:15px;}
input,button{border:none;border-radius:12px;padding:12px;font-size:16px;}
button{cursor:pointer;font-weight:700;text-transform:uppercase;}
button:disabled{opacity:0.5;cursor:default;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:15px 0;}
.cell{aspect-ratio:1;background:#2c3440;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;}
.win-cell{background:var(--win)!important;box-shadow:0 0 15px var(--win);}
.lose-cell{background:var(--red)!important;}
.navbar{display:flex;justify-content:space-around;background:var(--panel);padding:12px 0;border-top:1px solid #232a35;}
.nav-item{color:#8e8e93;font-size:12px;text-align:center;cursor:pointer;}
.active-nav{color:var(--accent);font-weight:bold;}
.panel{background:var(--panel);padding:15px;border-radius:15px;margin-bottom:15px;}
</style>
</head>
<body>

<header>
<div style="font-weight:900;color:var(--gold);">MINIBET UZ</div>
<div id="balance-display" style="font-weight:bold;color:var(--gold);">0 UZS</div>
</header>

<main id="main-container">

<!-- LOGIN / REGISTER -->
<div id="auth-screen">
<h2>Ro'yxatdan o'tish / Login</h2>
<div class="panel">
<input type="text" id="username" placeholder="Foydalanuvchi nomi">
<input type="password" id="password" placeholder="Parol">
<button onclick="registerUser()">Register</button>
<button onclick="loginUser()">Login</button>
<p id="auth-msg" style="color:var(--red);margin-top:8px;"></p>
</div>
</div>

<!-- LOBBY -->
<div id="lobby-view" class="hidden">
<h3>🔥 O'yinlar</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
<div style="text-align:center;cursor:pointer;background:var(--panel);padding:25px;border-radius:15px;" onclick="openGame('mines')">💣<br><b>Mines</b></div>
<div style="text-align:center;cursor:pointer;background:var(--panel);padding:25px;border-radius:15px;" onclick="openGame('crash')">🚀<br><b>Aviator</b></div>
</div>
<div class="panel">
<h4>Depozit / Pul qo'shish</h4>
<input type="number" id="deposit-amount" placeholder="Miqdor">
<button onclick="deposit()">Depozit</button>
</div>
</div>

<!-- AVIATOR -->
<div id="crash-view" class="hidden">
<div class="panel">
<div id="crash-area" style="position:relative;height:200px;border-radius:15px;background:radial-gradient(circle at bottom left,#0f172a,#000);overflow:hidden;">
<div id="crash-mult" style="position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:55px;font-weight:900;color:var(--win);">1.00x</div>
<div id="rocket" style="position:absolute;bottom:20px;left:20px;font-size:35px;">🚀</div>
</div>
<div style="margin-top:15px;">
<input type="number" id="crash-bet" placeholder="Stavka">
<button id="crash-btn" onclick="startCrash()" style="background:var(--win);color:white;">TIKISH</button>
</div>
<div class="panel" id="live-list" style="font-size:12px;"></div>
</div>
</div>

<!-- MINES -->
<div id="mines-view" class="hidden">
<div class="panel" style="display:flex;justify-content:space-between;">
<span>Koeff: <span id="m-mult">x1.00</span></span>
<span>Yutuq: <span id="m-win">0</span></span>
</div>
<div id="mines-grid" class="grid"></div>
<div class="panel">
<input type="number" id="mines-bet" placeholder="Stavka summasi">
<button id="mines-btn" onclick="startMines()" style="background:var(--accent);color:white;">BOSHLASH</button>
</div>
</div>

</main>

<div class="navbar">
<div class="nav-item active-nav" onclick="showTab('lobby')">🏠<br>Lobbi</div>
<div class="nav-item" onclick="alert('Bonus: 24 soatda 1 marta!')">🎁<br>Bonus</div>
<div class="nav-item" onclick="alert('Profil')">👤<br>Profil</div>
</div>

<script>
let session_id=null;
let balance=0;
let isPlaying=false;
let crashInt=false;
let mb=[],mo=0,mbt=0,mp=false;
let ms=[1.2,1.6,2.1,2.9,4.2,6.3,10,18,35,70];

// --- AUTH ---
function registerUser(){
    let u=document.getElementById('username').value;
    let p=document.getElementById('password').value;
    fetch('http://127.0.0.1:5000/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
    .then(r=>r.json()).then(d=>{
        if(d.success){session_id=d.session_id;balance=d.balance;showLobby();} else {document.getElementById('auth-msg').innerText=d.msg;}
    });
}
function loginUser(){
    let u=document.getElementById('username').value;
    let p=document.getElementById('password').value;
    fetch('http://127.0.0.1:5000/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
    .then(r=>r.json()).then(d=>{
        if(d.success){session_id=d.session_id;balance=d.balance;showLobby();} else {document.getElementById('auth-msg').innerText=d.msg;}
    });
}
function showLobby(){document.getElementById('auth-screen').classList.add('hidden');document.getElementById('lobby-view').classList.remove('hidden');updateBalance();}

// --- BALANS ---
function updateBalance(){document.getElementById('balance-display').innerText=balance.toLocaleString()+" UZS";}
function deposit(){let a=parseFloat(document.getElementById('deposit-amount').value);if(!a||a<=0)return;fetch('http://127.0.0.1:5000/deposit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:session_id,amount:a})}).then(r=>r.json()).then(d=>{if(d.success){balance=d.balance;updateBalance();alert("Depozit muvaffaqiyatli");}});}

// --- TAB ---
function showTab(tab){['lobby','crash','mines'].forEach(v=>document.getElementById(v+'-view').classList.add('hidden'));document.getElementById(tab+'-view').classList.remove('hidden');}

// --- GAMES ---
function openGame(g){showTab(g);if(g==='mines') initMines(); if(g==='crash') renderBets(false);}
function renderBets(active,m=1.0){let l=document.getElementById('live-list');l.innerHTML='<div style="color:#8e8e93;font-size:10px;display:flex;justify-content:space-between;margin-bottom:10px;"><span>ID</span><span>STAVKA</span><span>STATUS</span></div>';for(let i=0;i<6;i++){let id=100000+(i*12345%800000);let b=(i+1)*5000;let st=active?"Uchyapti...":(Math.random()>0.4?"Yutdi":"Kuydi");let cl=st==="Yutdi"?"status-win":st==="Kuydi"?"status-lose":"";if(active&&m>(1.1+i*0.4)){st=(1.1+i*0.4).toFixed(2)+"x yechdi";cl="status-win";}l.innerHTML+=`<div style="display:flex;justify-content:space-between;"><span>ID:${id}</span><span>${b}</span><span class="${cl}">${st}</span></div>`;}}

// --- CRASH ---
function startCrash(){if(isPlaying)return;let bet=parseFloat(document.getElementById('crash-bet').value);if(!bet||bet>balance)return;fetch('http://127.0.0.1:5000/aviator/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:session_id,bet:bet})}).then(r=>r.json()).then(d=>{if(d.success){balance=d.balance;updateBalance();isPlaying=true;let m=1.0;let limit=d.limit;let btn=document.getElementById('crash-btn');btn.disabled=false;btn.innerText="OLISH "+Math.floor(bet*m);crashInt=setInterval(()=>{if(m>=limit){clearInterval(crashInt);isPlaying=false;btn.innerText="TIKISH";return;} m+=0.01;document.getElementById('crash-mult').innerText=m.toFixed(2)+"x";btn.innerText="OLISH "+Math.floor(bet*m);renderBets(true,m);},80);btn.onclick=()=>{if(isPlaying){isPlaying=false;clearInterval(crashInt);balance+=Math.floor(bet*m);updateBalance();alert("Yutuq: "+Math.floor(bet*m));btn.innerText="TIKISH";}}}});}

// --- MINES ---
function initMines(){const g=document.getElementById('mines-grid');g.innerHTML='';for(let i=0;i<25;i++){let c=document.createElement('div');c.className='cell';c.onclick=()=>openM(c,i);g.appendChild(c);}}
function startMines(){if(mp)return;let bet=parseFloat(document.getElementById('mines-bet').value);if(!bet||bet>balance)return;fetch('http://127.0.0.1:5000/mines/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:session_id,bet:bet})}).then(r=>r.json()).then(d=>{if(d.success){balance=d.balance;updateBalance();mb=d.bombs;mo=0;mp=true;initMines();let btn=document.getElementById('mines-btn');btn.innerText="PULNI OLISH";btn.style.background="var(--gold)";btn.onclick=()=>{if(mp&&mo>0){balance+=Math.floor(bet*ms[mo-1]);updateBalance();alert("Yutuq: "+Math.floor(bet*ms[mo-1]));stopM();}}}});}
function openM(el,id){if(!mp||el.innerText!=='')return;if(mb.includes(id)){el.innerHTML="💣";el.classList.add('lose-cell');mp=false;alert("Bomba!");stopM();}else{el.innerHTML="💎";el.classList.add('win-cell');mo++;document.getElementById('m-mult').innerText="x"+ms[mo-1];document.getElementById('m-win').innerText=Math.floor(mbt*ms[mo-1]);}}
function stopM(){mp=false;let b=document.getElementById('mines-btn');b.innerText="BOSHLASH";b.style.background="var(--accent)";b.style.color="white";b.onclick=startMines;}
</script>

</body>
</html>
