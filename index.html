<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBet Uz - Ro'yxatdan o'tish</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a2a3a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .reg-card {
            background: #243447;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #28a745;
            font-size: 24px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a2a3a;
            border: 1px solid #34495e;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #28a745;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #218838; }
        .bonus-info {
            font-size: 12px;
            color: #bdc3c7;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="header">MiniBet Uz</div>
    <p style="text-align:center; font-size:14px;">Ro'yxatdan o'tish</p>
    
    <input type="text" id="firstName" placeholder="Ism *">
    <input type="text" id="lastName" placeholder="Familiya *">
    <input type="email" id="email" placeholder="Email *">
    <input type="text" id="phone" placeholder="Telefon (+998...)">
    <input type="password" id="password" placeholder="Parol *">
    <input type="number" id="tgId" placeholder="Telegram ID raqamingiz">
    
    <button onclick="register()">RO'YXATDAN O'TISH</button>
    
    <div class="bonus-info">
        Bonus: 10,000 UZS + 1XGAMES
    </div>
</div>

<script>
    async function register() {
        const data = {
            first_name: document.getElementById('firstName').value,
            last_name: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
            tg_id: parseInt(document.getElementById('tgId').value)
        };

        try {
            // Backend-ga so'rov yuborish
            const response = await fetch(`http://127.0.0.1:8000/api/auth/register?tg_id=${data.tg_id}&first_name=${data.first_name}&last_name=${data.last_name}&email=${data.email}&phone=${data.phone}&password=${data.password}`, {
                method: 'POST'
            });

            const result = await response.json();
            
            if (response.ok) {
                alert("✅ " + result.message);
                window.location.href = "game.html"; // O'yinga yo'naltirish
            } else {
                alert("❌ Xato: " + (result.detail || "Ma'lumotlarni tekshiring"));
            }
        } catch (error) {
            alert("Backend server o'chiq yoki ulanib bo'lmadi!");
        }
    }
</script>

</body>
</html>
