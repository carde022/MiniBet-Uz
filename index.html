<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniBet Official | Professional Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #1a237e; --dark: #0d1117; --panel: #161b22; --gold: #f59e0b; --win: #00c853; --red: #ff3d00; --text: #eef2f8; --brand-blue: #004586; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 100; background: var(--dark); }
        .hidden { display: none !important; }

        /* --- 1. 1xSTYLE LOADER --- */
        .loader-screen { background: #0b1a2e; align-items: center; justify-content: center; z-index: 1000; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #2196f3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 2. REG & LOGIN STYLE --- */
        #auth-screen { overflow-y: auto; background: #f4f6f9; color: #333; padding: 20px; }
        .reg-header { color: var(--brand-blue); text-align: center; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 20px; font-weight: 900; font-size: 20px;}
        .form-group { background: white; border-radius: 12px; padding: 10px 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group label { font-size: 10px; color: #7b8a97; text-transform: uppercase; font-weight: bold; }
        .form-group input { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 15px; outline: none; }
        .btn-main { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; color: var(--brand-blue); border: 1px solid var(--brand-blue); width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; }

        /* --- 3. LOBBY --- */
        header { background: var(--panel); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brand-blue); }
        .balance-box { background: #05070a; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--gold); color: var(--gold); font-weight: 800; font-size: 14px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .game-card { background: var(--panel); border-radius: 15px; padding: 20px 10px; text-align: center; border-bottom: 3px solid var(--brand-blue); transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }
        .game-card i { font-size: 32px; display: block; margin-bottom: 8px; }

        /* --- O'YINLAR --- */
        .mines-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; }
        .cell { aspect-ratio: 1; background: #2c3440; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .cell.opened { background: #161b22; }
    </style>
</head>
<body>

    <div id="loader" class="screen loader-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #fff; font-size: 13px; letter-spacing: 1px;">YUKLANMOQDA...</p>
    </div>

    <div id="auth-screen" class="screen hidden">
        <div id="reg-form">
            <div class="reg-header">MiniBet | Ro'yxatdan o'tish</div>
            <div class="form-group"><label>Email</label><input type="email" id="reg-mail"></div>
            <div class="form-group"><label>Parol</label><input type="password" id="reg-pass"></div>
            <div class="form-group"><label>Ism</label><input type="text" id="reg-ism"></div>
            <div class="form-group"><label>Familiya</label><input type="text" id="reg-fam"></div>
            <button class="btn-main" onclick="submitRegistration()">RO'YXATDAN O'TISH</button>
            <button class="btn-outline" onclick="toggleAuth('login')">Kirish qismiga o'tish</button>
        </div>
        <div id="login-form" class="hidden">
            <div class="reg-header">MiniBet | Kirish</div>
            <div class="form-group"><label>Email / Phone</label><input type="text" id="login-id"></div>
            <div class="form-group"><label>Parol</label><input type="password" id="login-pass"></div>
            <button class="btn-main" onclick="alert('Tez kunda!')">KIRISH</button>
            <button class="btn-outline" onclick="toggleAuth('reg')">Ro'yxatdan o'tish</button>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <header>
            <div style="font-weight: 900; color: var(--gold); font-size: 18px;">MiniBet PRO</div>
            <div class="balance-box"><span id="u-balance">0</span> UZS</div>
        </header>
        <div class="game-grid">
            <div class="game-card" onclick="openGame('mines')"><i>💣</i><b>MINES</b></div>
            <div class="game-card" onclick="openGame('aviator')"><i>🚀</i><b>AVIATOR</b></div>
            <div class="game-card" onclick="openGame('apple')"><i>🍎</i><b>APPLE</b></div>
            <div class="game-card" onclick="openGame('chicken')"><i>🍗</i><b>CHICKEN</b></div>
        </div>
        <div style="padding: 15px;">
            <button onclick="getBonus()" style="width:100%; padding:15px; border-radius:12px; background:linear-gradient(to right, #1a237e, #0d47a1); color:white; border:none; font-weight:bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">🎁 KUNLIK BONUS</button>
        </div>
    </div>

    <div id="game-overlay" class="screen hidden">
        <header>
            <button onclick="exitGame()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            <div class="balance-box"><span id="g-balance">0</span> UZS</div>
        </header>
        <div id="game-container" class="game-view" style="padding: 20px;"></div>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    const SERVER_URL = "https://justa-recriminative-nonrequisitely.ngrok-free.dev";
    let uId = tg.initDataUnsafe.user?.id || 7425396576;
    let balance = 0;

    async function init() {
        try {
            const r = await fetch(`${SERVER_URL}/api/v3/check_user`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({tg_id: uId})
            });
            const d = await r.json();
            
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                if(d.status === "registered") {
                    balance = d.balance;
                    updateUI();
                    document.getElementById('app-screen').classList.remove('hidden');
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                }
            }, 1500);
        } catch(e) { console.error(e); }
    }

    function updateUI() {
        document.getElementById('u-balance').innerText = Math.floor(balance).toLocaleString();
        const gb = document.getElementById('g-balance');
        if(gb) gb.innerText = Math.floor(balance).toLocaleString();
    }

    function toggleAuth(type) {
        document.getElementById('reg-form').classList.toggle('hidden', type === 'login');
        document.getElementById('login-form').classList.toggle('hidden', type === 'reg');
    }

    async function submitRegistration() {
        const data = {
            tg_id: uId,
            familiya: document.getElementById('reg-fam').value,
            ism: document.getElementById('reg-ism').value,
            birthday: "2000-01-01",
            email: document.getElementById('reg-mail').value,
            phone: uId.toString(), 
            password: document.getElementById('reg-pass').value
        };
        if(!data.email || !data.password) return alert("Ma'lumotlarni kiriting!");
        
        const r = await fetch(`${SERVER_URL}/api/v3/register_full`, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify(data)
        });
        const res = await r.json();
        if(res.status === "success") location.reload();
        else alert(res.detail || "Xato!");
    }

    async function getBonus() {
        const r = await fetch(`${SERVER_URL}/api/v3/get_bonus`, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({tg_id: uId})
        });
        const res = await r.json();
        if(res.status === "success") {
            balance = res.new_balance;
            updateUI();
            alert("Tabriklaymiz! 5000 UZS bonus berildi.");
        } else {
            alert(res.detail);
        }
    }

    function openGame(type) {
        document.getElementById('game-overlay').classList.remove('hidden');
        const container = document.getElementById('game-container');
        if(type === 'mines') {
            container.innerHTML = `
                <h3 style="text-align:center">MINES</h3>
                <div class="mines-board" id="m-board"></div>
                <input type="number" id="m-bet" value="1000" style="width:100%; padding:12px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:10px;">
                <button onclick="playMines()" id="btn-play" class="btn-main" style="background:var(--gold)">TIKISH</button>
            `;
            const board = document.getElementById('m-board');
            for(let i=0; i<25; i++) board.innerHTML += `<div class="cell" id="c-${i}">?</div>`;
        } else {
            container.innerHTML = `<p style="text-align:center; margin-top:50px;">${type.toUpperCase()} o'yini tez kunda qo'shiladi...</p>`;
        }
    }

    function exitGame() { document.getElementById('game-overlay').classList.add('hidden'); }
    window.onload = init;
</script>
</body>
</html>
