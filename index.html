<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>MiniBet Uz | Kirish</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body { max-width: 400px; margin: 20px auto; padding: 20px; background: #1a2a3a; }
        .card { background: #243447; padding: 20px; border-radius: 10px; }
        button { width: 100%; background: #28a745; color: white; border: none; }
        .error { color: #ff4d4d; font-size: 13px; margin-top: 10px; white-space: pre-line; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; color: #28a745;">MiniBet Uz</h2>
        <input type="text" id="fn" placeholder="Ism">
        <input type="text" id="ln" placeholder="Familiya">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Telefon (+998...)">
        <input type="password" id="pw" placeholder="Parol">
        <input type="number" id="tg" placeholder="Telegram ID">
        <button onclick="doRegister()">RO'YXATDAN O'TISH</button>
        <div id="error-box" class="error"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function doRegister() {
            const errorBox = document.getElementById('error-box');
            errorBox.innerText = "";
            
            const userData = {
                first_name: document.getElementById('fn').value,
                last_name: document.getElementById('ln').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('pw').value,
                tg_id: document.getElementById('tg').value
            };

            try {
                const res = await request("/api/auth/register", "POST", userData);
                alert("✅ " + res.message);
                localStorage.setItem("my_tg_id", userData.tg_id);
                window.location.href = "game.html";
            } catch (err) {
                errorBox.innerText = "❌ " + err.message;
            }
        }
    </script>
</body>
</html>
