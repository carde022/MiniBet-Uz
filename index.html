<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiniBet Uz | Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #090e14; --bg-panel: #141b25; --accent: #007aff;
            --win: #22c55e; --lose: #ef4444; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-dark); color: var(--text);
            font-family: -apple-system, sans-serif; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }
        .hidden { display: none !important; }

        /* Header */
        header {
            background: var(--bg-panel); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #232a35;
        }
        .balance-value { font-size: 18px; font-weight: 700; color: #ffcc00; }

        /* Main Area */
        #main-container { flex: 1; overflow-y: auto; padding: 20px; }

        /* Game Cards */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .game-card { background: var(--bg-panel); border-radius: 16px; padding: 10px; text-align: center; cursor: pointer; }
        .game-thumb { font-size: 40px; margin-bottom: 10px; }

        /* Mines Game UI */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .mines-cell { aspect-ratio: 1; background: #2c3440; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .open-win { background: var(--win) !important; box-shadow: 0 0 10px var(--win); }
        .open-lose { background: var(--lose) !important; }

        /* Stats & Controls */
        .game-info-bar { display: flex; justify-content: space-around; background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #94a3b8; }
        .stat-val { font-weight: bold; color: #00ff00; }

        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        #cashout-btn { background: #ffcc00; color: black; display: none; }
        #start-btn { background: var(--accent); color: white; }

        /* Navigation */
        footer { background: var(--bg-panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #232a35; }
        .nav-item { color: #94a3b8; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        /* Profile Modal */
        #profile-view { text-align: center; padding-top: 50px; }
        .user-img { width: 80px; height: 80px; background: #3b82f6; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px;}
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: #ffcc00;">MINIBET UZ</div>
    <div class="balance-container">
        <div class="balance-value" id="balance-display">0 UZS</div>
    </div>
</header>

<main id="main-container">
    <div id="lobby-view">
        <h3 style="margin-top:0;">🔥 Crash O'yinlar</h3>
        <div class="game-grid">
            <div class="game-card" onclick="openMines()">
                <div class="game-thumb">💣</div>
                <b>Mines</b><br><small>Original</small>
            </div>
            <div class="game-card" onclick="alert('Tez kunda...')">
                <div class="game-thumb">🚀</div>
                <b>Crash</b><br><small>Yaqinda</small>
            </div>
        </div>
    </div>

    <div id="game-view" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:white; margin-bottom:10px;">⬅️ Orqaga</button>
        <div class="game-info-bar">
            <div class="stat-box"><div class="stat-label">KOEFFITSIYENT</div><div class="stat-val" id="multiplier-val">x1.00</div></div>
            <div class="stat-box"><div class="stat-label">YUTUQ</div><div class="stat-val" id="win-val">0 UZS</div></div>
        </div>
        <div class="mines-grid" id="mines-grid"></div>
        <input type="number" id="bet-input" value="1000" style="width:100%; padding:15px; border-radius:10px; margin-bottom:10px; background:#1e293b; color:white; border:1px solid #334155;">
        <button id="start-btn" class="btn-action" onclick="startGame()">O'YINNI BOSHLASH</button>
        <button id="cashout-btn" class="btn-action" onclick="cashout()">PULNI OLISH (CASHOUT)</button>
    </div>

    <div id="bonus-view" class="hidden">
        <h2>🎁 Kunlik Bonuslar</h2>
        <div style="background:var(--bg-panel); padding:20px; border-radius:15px; text-align:center;">
            <p>Har 24 soatda 5,000 UZS bonus oling!</p>
            <button class="btn-action" style="background:#22c55e; color:white;" onclick="alert('Bonus olindi!')">BONUSNI OLISH</button>
        </div>
    </div>

    <div id="profile-view" class="hidden">
        <div class="user-img">👤</div>
        <h2 id="user-name">Foydalanuvchi</h2>
        <p id="user-id">ID: 00000000</p>
        <hr style="border-color:#232a35;">
        <p>Statistika: 0 ta o'yin</p>
        <button class="btn-action" style="background:#ef4444; color:white;">CHIQISH</button>
    </div>
</main>

<footer>
    <div class="nav-item active" onclick="showTab('lobby')">🏠<br>Lobbi</div>
    <div class="nav-item" onclick="showTab('bonus')">🎁<br>Bonus</div>
    <div class="nav-item" onclick="showTab('profile')">👤<br>Profil</div>
</footer>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let balance = 15000;
    let bet = 0;
    let isPlaying = false;
    let openedCells = 0;
    let bombs = [];
    let multipliers = [1.2, 1.5, 1.9, 2.4, 3.1, 4.0, 5.3, 7.1, 9.8, 14.1];

    document.getElementById('balance-display').innerText = balance.toLocaleString() + " UZS";
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "O'yinchi";
    document.getElementById('user-id').innerText = "ID: " + (tg.initDataUnsafe.user?.id || "Noma'lum");

    function showTab(tab) {
        document.getElementById('lobby-view').classList.add('hidden');
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('bonus-view').classList.add('hidden');
        document.getElementById('profile-view').classList.add('hidden');
        document.getElementById(tab + '-view').classList.remove('hidden');
    }

    function openMines() { showTab('game'); createGrid(); }

    function createGrid() {
        const grid = document.getElementById('mines-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'mines-cell';
            cell.onclick = () => openCell(cell, i);
            grid.appendChild(cell);
        }
    }

    function startGame() {
        bet = parseFloat(document.getElementById('bet-input').value);
        if (bet > balance || bet <= 0) return alert("Balans yetarli emas!");

        isPlaying = true;
        openedCells = 0;
        bombs = [];
        balance -= bet;
        updateUI();

        // Bombalarni joylash (Professional algoritm: 3 ta bomba)
        while(bombs.length < 3) {
            let r = Math.floor(Math.random() * 25);
            if(!bombs.includes(r)) bombs.push(r);
        }

        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('cashout-btn').style.display = 'block';
        createGrid();
    }

    function openCell(cell, id) {
        if (!isPlaying || cell.classList.contains('disabled')) return;

        cell.classList.add('disabled');
        // YUTIMQOR ALGORITM: 80% holatda yutadi, agar o'yinchi ko'p ochmagan bo'lsa
        let chance = Math.random();
        let forceBomb = (openedCells > 4 && chance < 0.5); // 5-topishdan keyin qiyinlashadi

        if (bombs.includes(id) || forceBomb) {
            cell.innerHTML = "💣";
            cell.classList.add('open-lose');
            isPlaying = false;
            alert("BOMBA! Yutqazdingiz.");
            resetGame();
        } else {
            cell.innerHTML = "💎";
            cell.classList.add('open-win');
            openedCells++;
            let currentMult = multipliers[openedCells - 1];
            document.getElementById('multiplier-val').innerText = "x" + currentMult.toFixed(2);
            document.getElementById('win-val').innerText = Math.floor(bet * currentMult).toLocaleString() + " UZS";
        }
    }

    function cashout() {
        if (!isPlaying || openedCells === 0) return;
        let currentMult = multipliers[openedCells - 1];
        let winAmount = Math.floor(bet * currentMult);
        balance += winAmount;
        alert("Tabriklaymiz! Siz " + winAmount + " UZS yutdingiz!");
        
        // Botga ma'lumot yuborish
        tg.sendData(JSON.stringify({result: "win", amount: winAmount}));
        resetGame();
    }

    function resetGame() {
        isPlaying = false;
        document.getElementById('start-btn').classList.remove('hidden');
        document.getElementById('cashout-btn').style.display = 'none';
        document.getElementById('multiplier-val').innerText = "x1.00";
        document.getElementById('win-val').innerText = "0 UZS";
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance-display').innerText = balance.toLocaleString() + " UZS";
    }
</script>
</body>
</html>
