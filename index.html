<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBet Real Casino</title>
<style>
:root{
  --bg:#0c1118;
  --card:#151c26;
  --accent:#0ea5e9;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#facc15;
}
body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:#fff;
}
.hidden{display:none}
.container{padding:15px; max-width:480px; margin:auto;}
input,button{padding:12px;border:none;border-radius:10px;margin-top:8px;width:100%;font-size:16px;}
button{cursor:pointer;font-weight:bold;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.cell{aspect-ratio:1;background:#1f2937;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.win{background:var(--green)}
.lose{background:var(--red)}
#crashArea{height:200px;background:#000;border-radius:12px;position:relative;overflow:hidden;margin-top:10px;}
#rocket{position:absolute;bottom:20px;left:20px;font-size:28px;}
#mult{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:45px;font-weight:bold;color:var(--green);}
.nav{display:flex;gap:10px;margin-top:10px;}
.nav button{flex:1;}
</style>
</head>
<body>

<div class="container">

<h2 id="bal">0 UZS</h2>

<!-- LOGIN/REGISTER -->
<div id="auth" class="card">
  <h3>Login / Register</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="registerUser()">Register</button>
  <button onclick="loginUser()">Login</button>
</div>

<!-- DEPOSIT -->
<div id="depositCard" class="card hidden">
  <h4>Deposit</h4>
  <input id="depositAmount" type="number" placeholder="Summa">
  <button onclick="deposit()">Deposit</button>
</div>

<!-- NAV -->
<div class="nav hidden" id="navBtns">
  <button onclick="openTab('aviator')">🚀 Aviator</button>
  <button onclick="openTab('mines')">💣 Mines</button>
</div>

<!-- AVIATOR -->
<div id="aviator" class="card hidden">
  <div id="crashArea">
    <div id="rocket">🚀</div>
    <div id="mult">1.00x</div>
  </div>
  <input id="bet" type="number" value="5000" placeholder="Bet">
  <button id="crashBtn" onclick="startCrash()" style="background:var(--green)">START</button>
</div>

<!-- MINES -->
<div id="mines" class="card hidden">
  <div id="grid" class="grid"></div>
  <input id="mbet" type="number" value="5000" placeholder="Bet">
  <button onclick="startMines()">START</button>
  <button onclick="cashoutMines()">CASHOUT</button>
</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
let socket = io();
let user_id = null;
let playingCrash = false;
let crashPoint = 0;
let currentBet = 0;
let openedMines = 0;

// ---------------- AUTH ----------------
async function registerUser(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  let res=await fetch("/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
  alert("Registered! Now login.");
}
async function loginUser(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  let res=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
  let d=await res.json();
  if(d.error){alert(d.error); return;}
  user_id=d.user_id;
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("depositCard").classList.remove("hidden");
  document.getElementById("navBtns").classList.remove("hidden");
  loadBalance();
}

// ---------------- DEPOSIT ----------------
async function deposit(){
  let amt=parseFloat(document.getElementById("depositAmount").value);
  let res=await fetch("/api/deposit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id,user_id,amount:amt})});
  let d=await res.json();
  document.getElementById("bal").innerText=d.balance+" UZS";
  document.getElementById("depositCard").classList.add("hidden");
}

// ---------------- BALANCE ----------------
async function loadBalance(){
  if(!user_id) return;
  let res=await fetch("/api/balance",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id})});
  let d=await res.json();
  document.getElementById("bal").innerText=d.balance+" UZS";
}

// ---------------- NAV ----------------
function openTab(t){
  document.getElementById("aviator").classList.add("hidden");
  document.getElementById("mines").classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}

// ---------------- AVIATOR ----------------
async function startCrash(){
  if(playingCrash || !user_id) return;
  let bet=parseFloat(document.getElementById("bet").value);
  let res=await fetch("/api/aviator/bet",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id,bet})});
  let d=await res.json();
  if(d.error){alert(d.error);return;}
  currentBet=bet;
  playingCrash=true;
  document.getElementById("bal").innerText=d.balance+" UZS";
  document.getElementById("crashBtn").innerText="CASHOUT";
  document.getElementById("crashBtn").style.background="var(--gold)";
}

socket.on("tick",data=>{
  if(playingCrash) document.getElementById("mult").innerText=data.mult+"x";
});

socket.on("boom",data=>{
  if(playingCrash){
    document.getElementById("mult").innerText="BOOM";
    document.getElementById("crashBtn").innerText="START";
    document.getElementById("crashBtn").style.background="var(--green)";
    playingCrash=false;
    currentBet=0;
    loadBalance();
  }
});

document.getElementById("crashBtn").onclick=async ()=>{
  if(playingCrash){
    let mult=parseFloat(document.getElementById("mult").innerText);
    let res=await fetch("/api/aviator/cashout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id, mult, bet:currentBet})});
    let d=await res.json();
    alert("YUTUQ: "+d.win);
    playingCrash=false;
    document.getElementById("crashBtn").innerText="START";
    document.getElementById("crashBtn").style.background="var(--green)";
    loadBalance();
  } else startCrash();
}

// ---------------- MINES ----------------
let minesOpened=0;

async function startMines(){
  if(!user_id) return;
  let bet=parseFloat(document.getElementById("mbet").value);
  let res=await fetch("/api/mines/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id,bet})});
  let d=await res.json();
  if(d.error){alert(d.error);return;}
  loadBalance();
  minesOpened=0;
  let grid=document.getElementById("grid");
  grid.innerHTML="";
  for(let i=0;i<25;i++){
    let cell=document.createElement("div");
    cell.className="cell";
    cell.onclick=async ()=>{
      let r=await fetch("/api/mines/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id,index:i})});
      let j=await r.json();
      if(j.result=="lose"){cell.innerText="💣";cell.classList.add("lose"); alert("BOMBA!");}
      else{cell.innerText="💎";cell.classList.add("win"); minesOpened++;}
    }
    grid.appendChild(cell);
  }
}

async function cashoutMines(){
  if(!user_id) return;
  let res=await fetch("/api/mines/cashout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id})});
  let d=await res.json();
  if(d.error){alert(d.error);return;}
  alert("YUTUQ: "+d.win);
  loadBalance();
}
</script>

</body>
</html>
