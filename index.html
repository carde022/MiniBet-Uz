<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniBet Uz | Pro API</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0f19; --panel: #161c28; --accent: #3b82f6; --gold: #f59e0b; --win: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #232a35; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { background: var(--panel); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232a35; }
        .balance-card { background: #1e293b; padding: 8px 15px; border-radius: 20px; border: 1px solid #334155; }
        
        #main-scroll { flex: 1; overflow-y: auto; padding: 15px; }

        .game-card { background: var(--panel); border-radius: 20px; padding: 25px; margin-bottom: 15px; text-align: center; border: 1px solid #232a35; position: relative; overflow: hidden; transition: 0.3s; }
        .game-card:active { transform: scale(0.97); }
        .game-icon { font-size: 50px; margin-bottom: 10px; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--win); box-shadow: 0 0 5px var(--win); }

        footer { background: var(--panel); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #232a35; }
        .nav-btn { color: #94a3b8; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-active { color: var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="spinner"></div>
    <h2 style="color: var(--gold); margin-top: 20px;">MINIBET UZ</h2>
    <p id="auth-status">Serverga ulanmoqda...</p>
</div>

<header>
    <div><span class="status-dot online"></span><b style="color: var(--gold);">PRO</b></div>
    <div class="balance-card">
        <span id="user-balance" style="font-weight: 800; color: #fbbf24;">0</span> 
        <small style="color: #94a3b8; font-size: 10px;">UZS</small>
    </div>
</header>

<main id="main-scroll">
    <div id="view-lobby">
        <h3 style="margin: 0 0 15px 5px;">Tanlang:</h3>
        <div class="game-card" onclick="openGame('mines')">
            <div class="game-icon">💣</div>
            <div style="font-size: 20px; font-weight: 800;">MINES</div>
            <small style="color: #94a3b8;">Server-Side Random v2.0</small>
        </div>
        <div class="game-card" onclick="openGame('aviator')">
            <div class="game-icon">🚀</div>
            <div style="font-size: 20px; font-weight: 800;">AVIATOR</div>
            <small style="color: #94a3b8;">Live Crash System</small>
        </div>
    </div>

    <div id="view-game" class="hidden">
        <button onclick="backToLobby()" style="background:none; border:none; color:#94a3b8; margin-bottom:15px;">⬅️ Lobbi</button>
        <div id="game-engine-render"></div>
    </div>
</main>

<footer>
    <div class="nav-btn nav-active">🏠<br>Asosiy</div>
    <div class="nav-btn">🎁<br>Bonus</div>
    <div class="nav-btn">👤<br>Profil</div>
</footer>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // YANGILANGAN NGROK HAVOLASI
    const SERVER_URL = "https://justa-recriminative-nonrequisitely.ngrok-free.dev"; 

    let userData = {
        user_id: tg.initDataUnsafe.user?.id || 7425396576,
        username: tg.initDataUnsafe.user?.first_name || "O'yinchi"
    };

    async function initLogin() {
        try {
            const response = await fetch(`${SERVER_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(userData)
            });
            const data = await response.json();
            if(data.status === "success") {
                document.getElementById('user-balance').innerText = data.balance.toLocaleString();
                setTimeout(() => document.getElementById('auth-screen').classList.add('hidden'), 1000);
            }
        } catch (e) {
            console.error("Ulanishda xato:", e);
            document.getElementById('auth-status').innerText = "Xato: Server o'chiq!";
            document.getElementById('auth-status').style.color = "red";
        }
    }

    async function syncBalance(amount) {
        try {
            await fetch(`${SERVER_URL}/update_balance`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: userData.user_id, amount: amount })
            });
            refreshBalance();
        } catch (e) { console.log("Balans yangilanmadi"); }
    }

    async function refreshBalance() {
        try {
            const res = await fetch(`${SERVER_URL}/get_balance/${userData.user_id}`);
            const data = await res.json();
            document.getElementById('user-balance').innerText = data.balance.toLocaleString();
        } catch (e) { console.log("Balansni olib bo'lmadi"); }
    }

    function openGame(type) {
        document.getElementById('view-lobby').classList.add('hidden');
        document.getElementById('view-game').classList.remove('hidden');
        alert(type + " o'yini serverdan yuklanmoqda...");
    }

    function backToLobby() {
        document.getElementById('view-game').classList.add('hidden');
        document.getElementById('view-lobby').classList.remove('hidden');
    }

    window.onload = initLogin;
</script>
</body>
</html>
