<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal | MiniBet Uz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #crystal-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: #141f2b;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
        }
        .gem {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: #243447;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .gem.win { animation: pulse 0.5s infinite; background: #28a745; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <button onclick="location.href='main.html'" style="background:none; border:none; color:white; font-size:22px;"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin-left: 10px; color: #f1c40f;">💎 CRYSTAL</h2>
        </div>

        <div id="crystal-board"></div>

        <div class="card" style="margin-top: 20px;">
            <input type="number" id="bet" value="1000" placeholder="Stavka">
            <button id="spin-btn" class="btn btn-success" onclick="startCrystal()">O'YNASH (SPIN)</button>
            <div id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/crystal.js"></script>
</body>
</html>
